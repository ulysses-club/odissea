<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Квиз Odissea - Трансляция</title>
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/quiz.css">
    
    <style>
        /* ===== РЕЖИМ ТРАНСЛЯЦИИ - ПОЛНОЭКРАННАЯ АДАПТАЦИЯ ===== */
        :root {
            --broadcast-padding: clamp(6px, 1.5vh, 16px);
            --broadcast-gap: clamp(4px, 1vh, 12px);
        }

        body.quiz-broadcast {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 100%);
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .quiz-broadcast .header,
        .quiz-broadcast .hero-container,
        .quiz-broadcast .quiz-section:first-of-type,
        .quiz-broadcast #footer-container,
        .quiz-broadcast .mobile-menu-btn,
        .quiz-broadcast .weather-widget,
        .quiz-broadcast .nav-container {
            display: none !important;
        }

        .quiz-broadcast .about {
            height: 100vh;
            width: 100vw;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .quiz-broadcast .about__content {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-broadcast .quiz-container {
            height: 100vh;
            width: 100vw;
            max-width: 100%;
            max-height: 100%;
            margin: 0;
            border-radius: 0;
            padding: var(--broadcast-padding);
            display: flex;
            flex-direction: column;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: none;
            box-shadow: none;
            position: relative;
            overflow: hidden;
        }

        .quiz-broadcast .quiz-screen {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .quiz-broadcast .quiz-top-section {
            flex-shrink: 0;
            margin-bottom: var(--broadcast-gap);
        }

        .quiz-broadcast .quiz-middle-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
            gap: var(--broadcast-gap);
            padding: 0 var(--broadcast-padding);
        }

        .quiz-broadcast .quiz-bottom-section {
            flex-shrink: 0;
            margin-top: var(--broadcast-gap);
        }

        .quiz-broadcast .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(6px, 1.5vh, 12px) clamp(10px, 2vw, 20px);
            background: rgba(255, 255, 255, 0.05);
            border-radius: clamp(8px, 1.5vh, 12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: clamp(6px, 1.5vh, 10px);
        }

        .quiz-broadcast .question-progress {
            display: flex;
            align-items: center;
            gap: clamp(6px, 1.5vw, 12px);
            font-size: clamp(10px, 1.8vh, 14px);
            font-weight: 600;
            color: #f8f9fa;
            flex-wrap: wrap;
        }

        .quiz-broadcast .progress-bar {
            width: clamp(80px, 20vw, 180px);
            height: clamp(4px, 0.8vh, 8px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .quiz-broadcast .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .quiz-broadcast .question-timer {
            display: flex;
            align-items: center;
            gap: clamp(4px, 1vw, 6px);
            padding: clamp(4px, 1vh, 8px) clamp(8px, 1.5vw, 12px);
            background: rgba(37, 117, 252, 0.15);
            border-radius: 30px;
            border: 1px solid rgba(37, 117, 252, 0.3);
            font-size: clamp(14px, 3vh, 24px);
            font-weight: bold;
            color: #2575fc;
        }

        .quiz-broadcast .question-timer svg {
            width: clamp(12px, 2.5vh, 20px);
            height: clamp(12px, 2.5vh, 20px);
            fill: currentColor;
        }

        .quiz-broadcast .timer-critical {
            color: #ff4d4d;
            animation: broadcastPulse 1s infinite;
            border-color: rgba(255, 77, 77, 0.3);
            background: rgba(255, 77, 77, 0.15);
        }

        .quiz-broadcast .retry-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff9800, #f44336);
            padding: clamp(4px, 1vh, 8px) clamp(12px, 2vw, 20px);
            border-radius: 30px;
            font-weight: bold;
            font-size: clamp(12px, 2vh, 16px);
            margin-bottom: clamp(8px, 1.5vh, 12px);
            text-align: center;
        }

        .quiz-broadcast .question-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--broadcast-gap);
        }

        .quiz-broadcast .question-text {
            font-size: clamp(16px, 4vh, 32px) !important;
            text-align: center;
            margin: 0;
            line-height: 1.3;
            font-weight: 600;
            color: #f8f9fa;
            max-width: 95%;
            padding: 0;
        }

        .quiz-broadcast .media-container {
            max-width: min(90%, 800px);
            max-height: min(35vh, 400px);
            margin: 0 auto;
            border-radius: clamp(8px, 1.5vh, 12px);
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }

        .quiz-broadcast .media-container img,
        .quiz-broadcast .media-container video {
            width: 100%;
            height: auto;
            max-height: 35vh;
            object-fit: contain;
            display: block;
        }

        .quiz-broadcast .media-container audio {
            width: 100%;
            margin: clamp(8px, 1.5vh, 12px) 0;
        }

        .quiz-broadcast .media-container video {
            background: #000;
        }

        .quiz-broadcast .quiz-answers-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
            flex: 1;
        }

        .quiz-broadcast .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: clamp(6px, 1.5vh, 12px);
            width: min(95%, 1200px);
            max-height: 100%;
            overflow-y: auto;
            padding: clamp(4px, 1vh, 8px);
            margin: 0 auto;
        }

        .quiz-broadcast .answer-option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: clamp(8px, 1.5vh, 12px);
            padding: clamp(8px, 2vh, 16px) clamp(10px, 1.5vw, 20px);
            font-size: clamp(12px, 2.5vh, 18px) !important;
            display: flex;
            align-items: center;
            gap: clamp(8px, 1.5vw, 12px);
            transition: all 0.2s ease;
            cursor: pointer;
            min-height: clamp(40px, 6vh, 60px);
        }

        .quiz-broadcast .answer-option:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #6a11cb;
            transform: translateX(4px);
        }

        .quiz-broadcast .answer-option.selected {
            background: rgba(106, 17, 203, 0.25);
            border-color: #6a11cb;
        }

        .quiz-broadcast .answer-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: clamp(24px, 4.5vh, 36px);
            height: clamp(24px, 4.5vh, 36px);
            background: #6a11cb;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            font-size: clamp(12px, 2.5vh, 18px);
            flex-shrink: 0;
        }

        .quiz-broadcast .answer-text {
            flex: 1;
            line-height: 1.4;
            color: #f8f9fa;
            word-break: break-word;
        }

        .quiz-broadcast .blitz-container {
            width: min(95%, 1000px);
            max-height: 100%;
            overflow-y: auto;
            padding: clamp(4px, 1vh, 8px);
            margin: 0 auto;
        }

        .quiz-broadcast .blitz-question {
            background: rgba(255, 255, 255, 0.05);
            padding: clamp(8px, 1.8vh, 14px);
            margin-bottom: clamp(6px, 1.2vh, 10px);
            border-radius: clamp(8px, 1.5vh, 12px);
            border-left: 4px solid #2575fc;
            font-size: clamp(12px, 2.5vh, 18px);
            color: #f8f9fa;
        }

        .quiz-broadcast .open-answer-instruction {
            padding: clamp(12px, 3vh, 24px);
            background: rgba(255, 255, 255, 0.03);
            border-radius: clamp(12px, 2vh, 16px);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            text-align: center;
            margin: var(--broadcast-gap) 0;
        }

        .quiz-broadcast .writing-icon {
            font-size: clamp(20px, 4vh, 32px);
            margin-bottom: clamp(4px, 1vh, 8px);
        }

        .quiz-broadcast .open-answer-instruction p {
            font-size: clamp(14px, 2.8vh, 20px);
            color: #6c757d;
        }

        .quiz-broadcast .instructions-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: var(--broadcast-padding);
        }

        .quiz-broadcast .instructions-content {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr));
            gap: clamp(8px, 1.5vh, 16px);
            overflow-y: auto;
            padding: clamp(8px, 1.5vh, 16px);
            margin: clamp(8px, 1.5vh, 16px) 0;
        }

        .quiz-broadcast .instruction-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: clamp(10px, 1.8vh, 14px);
            padding: clamp(10px, 2vh, 18px);
            display: flex;
            align-items: flex-start;
            gap: clamp(8px, 1.5vw, 16px);
        }

        .quiz-broadcast .instruction-icon {
            font-size: clamp(20px, 4vh, 32px);
            flex-shrink: 0;
        }

        .quiz-broadcast .instruction-text {
            font-size: clamp(12px, 2.2vh, 16px);
            line-height: 1.4;
            color: #f8f9fa;
        }

        .quiz-broadcast .instruction-text strong {
            color: #2575fc;
        }

        .quiz-broadcast .instructions-warning {
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: clamp(10px, 1.8vh, 14px);
            padding: clamp(8px, 1.8vh, 16px);
            margin: clamp(8px, 1.5vh, 16px) 0;
            color: #FFC107;
            font-size: clamp(12px, 2.2vh, 16px);
            line-height: 1.4;
        }

        .quiz-broadcast .start-quiz-after-instructions {
            margin-top: auto;
            padding: clamp(8px, 1.8vh, 14px) clamp(16px, 3vw, 32px);
            font-size: clamp(14px, 2.5vh, 18px);
        }

        .quiz-broadcast .correct-answer-section {
            background: rgba(76, 175, 80, 0.15);
            border: 2px solid rgba(76, 175, 80, 0.3);
            border-radius: clamp(10px, 1.8vh, 14px);
            padding: clamp(10px, 2vh, 20px);
            margin: var(--broadcast-gap) 0;
        }

        .quiz-broadcast .correct-answer-header {
            display: flex;
            align-items: center;
            gap: clamp(6px, 1.5vw, 12px);
            margin-bottom: clamp(8px, 1.5vh, 12px);
        }

        .quiz-broadcast .correct-answer-header h4 {
            font-size: clamp(14px, 2.8vh, 20px);
            color: #4CAF50;
            margin: 0;
        }

        .quiz-broadcast .answer-icon {
            font-size: clamp(16px, 3vh, 24px);
        }

        .quiz-broadcast .correct-answer-content {
            font-size: clamp(14px, 2.8vh, 20px);
            line-height: 1.4;
            color: #f8f9fa;
        }

        .quiz-broadcast .correct-answer-option {
            display: flex;
            align-items: center;
            gap: clamp(8px, 1.5vw, 16px);
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
            border-radius: clamp(10px, 1.8vh, 14px);
            padding: clamp(8px, 1.8vh, 14px);
        }

        .quiz-broadcast .blitz-answers {
            display: flex;
            flex-direction: column;
            gap: clamp(6px, 1.2vh, 10px);
        }

        .quiz-broadcast .blitz-answer-item {
            background: rgba(76, 175, 80, 0.1);
            padding: clamp(8px, 1.5vh, 12px);
            border-radius: clamp(6px, 1.2vh, 10px);
            border-left: 4px solid #4CAF50;
            font-size: clamp(12px, 2.5vh, 18px);
        }

        .quiz-broadcast .open-correct-answer {
            background: rgba(76, 175, 80, 0.1);
            padding: clamp(10px, 2vh, 20px);
            border-radius: clamp(10px, 1.8vh, 14px);
            border: 2px dashed #4CAF50;
            text-align: center;
            font-size: clamp(14px, 2.8vh, 20px);
            font-weight: 600;
            color: #f8f9fa;
        }

        .quiz-broadcast .quiz-navigation {
            padding-top: clamp(6px, 1.5vh, 12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .quiz-broadcast .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: clamp(8px, 2vw, 16px);
            margin-bottom: clamp(4px, 1vh, 8px);
        }

        .quiz-broadcast .nav-btn {
            min-width: clamp(80px, 18vw, 140px);
            padding: clamp(6px, 1.5vh, 12px) clamp(10px, 2vw, 16px);
            font-size: clamp(11px, 2.2vh, 16px);
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            flex: 1;
            max-width: 180px;
        }

        .quiz-broadcast .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .quiz-broadcast .nav-hint {
            text-align: center;
            color: #6c757d;
            font-size: clamp(9px, 1.8vh, 12px);
            font-style: italic;
        }

        .quiz-broadcast .quiz-instruction {
            padding: clamp(4px, 1vh, 8px) clamp(8px, 1.5vw, 12px);
            background: rgba(255, 255, 255, 0.05);
            border-radius: clamp(6px, 1.2vh, 10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            margin-bottom: var(--broadcast-gap);
        }

        .quiz-broadcast .instruction-badge {
            display: inline-block;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            padding: clamp(2px, 0.6vh, 4px) clamp(8px, 1.5vw, 16px);
            border-radius: 30px;
            font-weight: bold;
            margin-bottom: clamp(2px, 0.5vh, 4px);
            font-size: clamp(10px, 2vh, 14px);
        }

        .quiz-broadcast .quiz-instruction p {
            font-size: clamp(10px, 2vh, 14px);
            color: #6c757d;
            margin: 0;
        }

        .quiz-broadcast .quiz-welcome,
        .quiz-broadcast .quiz-results {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .quiz-broadcast .welcome-content {
            max-width: min(90%, 800px);
            text-align: center;
            padding: var(--broadcast-padding);
        }

        .quiz-broadcast .welcome-content h2 {
            font-size: clamp(20px, 5vh, 42px);
            margin-bottom: clamp(8px, 2vh, 20px);
            background: linear-gradient(to right, #6a11cb, #2575fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        .quiz-broadcast .welcome-content p {
            font-size: clamp(14px, 2.8vh, 22px);
            margin-bottom: clamp(16px, 3vh, 32px);
            color: #6c757d;
        }

        .quiz-broadcast .quiz-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(8px, 1.5vw, 16px);
            margin: clamp(12px, 2.5vh, 28px) 0;
        }

        .quiz-broadcast .quiz-stat-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: clamp(10px, 1.8vh, 14px);
            padding: clamp(8px, 1.8vh, 18px);
            text-align: center;
        }

        .quiz-broadcast .quiz-stat-number {
            font-size: clamp(22px, 5vh, 42px);
            font-weight: bold;
            color: #2575fc;
            margin-bottom: clamp(2px, 0.5vh, 6px);
            line-height: 1;
        }

        .quiz-broadcast .quiz-stat-label {
            font-size: clamp(10px, 2vh, 14px);
            color: #6c757d;
        }

        .quiz-broadcast .final-score {
            font-size: clamp(32px, 8vh, 70px);
            font-weight: bold;
            margin: clamp(12px, 2.5vh, 28px) 0;
            background: linear-gradient(to right, #6a11cb, #2575fc, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .quiz-broadcast .final-message {
            font-size: clamp(14px, 2.8vh, 22px);
            margin: clamp(12px, 2.5vh, 28px) 0;
            color: #f8f9fa;
            line-height: 1.4;
        }

        .quiz-broadcast .results-actions {
            display: flex;
            justify-content: center;
            gap: clamp(8px, 2vw, 20px);
            margin-top: clamp(12px, 2.5vh, 28px);
            flex-wrap: wrap;
        }

        @keyframes broadcastPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes broadcastFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quiz-broadcast .question-slide,
        .quiz-broadcast .answer-slide,
        .quiz-broadcast .retry-slide,
        .quiz-broadcast .instructions-container,
        .quiz-broadcast .round-intro,
        .quiz-broadcast .round-results {
            animation: broadcastFadeIn 0.3s ease-out;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .quiz-broadcast .answers-grid { grid-template-columns: 1fr; width: 98%; }
            .quiz-broadcast .question-header { flex-direction: column; text-align: center; }
            .quiz-broadcast .question-progress { width: 100%; justify-content: center; }
            .quiz-broadcast .nav-buttons { flex-direction: column; }
            .quiz-broadcast .nav-btn { width: 100%; max-width: none; }
            .quiz-broadcast .instructions-content { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .quiz-broadcast .media-container { max-height: 28vh; }
            .quiz-broadcast .media-container img,
            .quiz-broadcast .media-container video { max-height: 28vh; }
            .quiz-broadcast .answer-option { padding: 6px 8px; min-height: 36px; }
            .quiz-broadcast .answer-letter { width: 22px; height: 22px; font-size: 11px; }
            .quiz-broadcast .quiz-stats-grid { grid-template-columns: 1fr; }
        }

        @media (max-height: 600px) {
            .quiz-broadcast .media-container { max-height: 25vh; }
            .quiz-broadcast .media-container img,
            .quiz-broadcast .media-container video { max-height: 25vh; }
            .quiz-broadcast .quiz-instruction { display: none; }
            .quiz-broadcast .instruction-badge { display: none; }
        }

        @media (max-height: 500px) {
            .quiz-broadcast .question-header { padding: 4px 8px; }
            .quiz-broadcast .answer-option { min-height: 32px; padding: 4px 6px; }
            .quiz-broadcast .blitz-question { padding: 4px 6px; }
        }

        @media (max-width: 900px) and (orientation: landscape) {
            .quiz-broadcast .media-container { max-height: 30vh; }
            .quiz-broadcast .answers-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
            .quiz-broadcast .answer-option:hover { transform: none; }
        }

        .broadcast-overlay {
            position: fixed;
            top: clamp(5px, 2vh, 10px);
            right: clamp(5px, 2vw, 10px);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: clamp(4px, 1vh, 8px) clamp(8px, 2vw, 12px);
            border-radius: 30px;
            font-size: clamp(10px, 2vh, 14px);
            z-index: 2000;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
            pointer-events: none;
        }

        .quiz-version-switcher {
            position: fixed;
            top: clamp(5px, 2vh, 10px);
            left: clamp(5px, 2vw, 10px);
            z-index: 2000;
        }

        .quiz-version-switcher .btn {
            font-size: clamp(10px, 2vh, 14px);
            padding: clamp(4px, 1vh, 8px) clamp(8px, 2vw, 12px);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .quiz-version-switcher .btn:hover {
            background: rgba(106, 17, 203, 0.5);
            transform: translateY(-2px);
            border-color: #6a11cb;
        }
