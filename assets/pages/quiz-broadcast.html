<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Квиз Odissea - Трансляция</title>
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/quiz.css">
    <link rel="stylesheet" href="../css/quiz-broadcast.css">
    
    <!-- Только специфичные для HTML стили (не дублируем из CSS) -->
    <style>
        /* Кнопка открытия отдельного окна управления */
        .control-window-btn {
            position: fixed !important;
            bottom: 20px !important;
            right: 20px !important;
            z-index: 9999 !important;
            background: linear-gradient(135deg, #6a11cb, #2575fc) !important;
            border: none !important;
            width: 56px !important;
            height: 56px !important;
            border-radius: 50% !important;
            cursor: pointer !important;
            box-shadow: 0 4px 20px rgba(106, 17, 203, 0.6) !important;
            transition: all 0.3s ease !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-size: 28px !important;
            color: white !important;
        }
        
        .control-window-btn:hover {
            transform: scale(1.1) !important;
            box-shadow: 0 6px 25px rgba(106, 17, 203, 0.8) !important;
        }
        
        @media (max-width: 768px) {
            .control-window-btn {
                width: 48px !important;
                height: 48px !important;
                font-size: 24px !important;
                bottom: 15px !important;
                right: 15px !important;
            }
        }
        
        /* Убеждаемся, что все контейнеры занимают полный экран */
        .quiz-broadcast .about {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
        }
        
        .quiz-broadcast .about__content {
            height: 100%;
            width: 100%;
        }
        
        .quiz-broadcast .quiz-container {
            height: 100vh;
            width: 100vw;
            border-radius: 0;
            margin: 0;
            padding: clamp(6px, 1.5vh, 16px);
        }
        
        .broadcast-overlay {
            position: fixed;
            top: clamp(5px, 2vh, 10px);
            right: clamp(5px, 2vw, 10px);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: clamp(4px, 1vh, 8px) clamp(8px, 2vw, 12px);
            border-radius: 30px;
            font-size: clamp(10px, 2vh, 14px);
            z-index: 2000;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }

        .quiz-version-switcher {
            position: fixed;
            top: clamp(5px, 2vh, 10px);
            left: clamp(5px, 2vw, 10px);
            z-index: 2000;
        }

        .quiz-version-switcher .btn {
            font-size: clamp(10px, 2vh, 14px);
            padding: clamp(4px, 1vh, 8px) clamp(8px, 2vw, 12px);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .btn--primary { 
            background: linear-gradient(to right, #6a11cb, #2575fc); 
            color: white; 
        }
        
        .btn--outline { 
            background: transparent; 
            border: 2px solid #6a11cb; 
            color: white; 
        }
    </style>
</head>

<body class="quiz-broadcast">
    <div class="broadcast-overlay">🎬 РЕЖИМ ТРАНСЛЯЦИИ</div>
    <div class="quiz-version-switcher">
        <button class="btn btn--outline" onclick="window.location.href='quiz.html'">📱 Обычный режим</button>
    </div>

    <section id="quiz-start" class="about">
        <div class="about__content">
            <div class="quiz-container">
                <div class="quiz-welcome" id="quiz-welcome">
                    <div class="welcome-content">
                        <h2>КВИЗ ODISSEA</h2>
                        <p>Готовы начать трансляцию?</p>
                        <div class="quiz-stats-grid">
                            <div class="quiz-stat-item"><div class="quiz-stat-number">7</div><div class="quiz-stat-label">Туров</div></div>
                            <div class="quiz-stat-item"><div class="quiz-stat-number">~60</div><div class="quiz-stat-label">Вопросов</div></div>
                            <div class="quiz-stat-item"><div class="quiz-stat-number">60</div><div class="quiz-stat-label">Секунд</div></div>
                        </div>
                        <button class="btn btn--primary start-quiz-btn" id="start-quiz-btn">НАЧАТЬ КВИЗ</button>
                    </div>
                </div>
                <div class="quiz-questions" id="quiz-questions" style="display: none;"></div>
                <div class="quiz-results" id="quiz-results" style="display: none;"></div>
            </div>
        </div>
    </section>

    <script src="../js/quiz.js"></script>
    <script src="../js/quiz-broadcast-control.js"></script>
</body>

</html>
