<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Квиз Odissea - Трансляция</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/quiz.css">
    <style>
        /* Только уникальные стили для трансляции */
        body.quiz-broadcast {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 100%);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            inset: 0;
        }

        .broadcast-overlay {
            position: fixed;
            top: clamp(5px, 2vh, 10px);
            right: clamp(5px, 2vw, 10px);
            background: rgba(0,0,0,.8);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: clamp(4px, 1vh, 8px) clamp(8px, 2vw, 12px);
            border-radius: 30px;
            font-size: clamp(10px, 2vh, 14px);
            z-index: 2000;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,.2);
            pointer-events: none;
        }

        .quiz-version-switcher {
            position: fixed;
            top: clamp(5px, 2vh, 10px);
            left: clamp(5px, 2vw, 10px);
            z-index: 2000;
        }

        .quiz-version-switcher .btn {
            font-size: clamp(10px, 2vh, 14px);
            padding: clamp(4px, 1vh, 8px) clamp(8px, 2vw, 12px);
            background: rgba(0,0,0,.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,.3);
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            transition: all .3s;
            cursor: pointer;
        }

        .quiz-version-switcher .btn:hover {
            background: rgba(106,17,203,.5);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        /* Скрытие лишних элементов */
        .quiz-broadcast .header,
        .quiz-broadcast .hero-container,
        .quiz-broadcast #quiz-rules,
        .quiz-broadcast #footer-container,
        .quiz-broadcast .mobile-menu-btn,
        .quiz-broadcast .weather-widget,
        .quiz-broadcast .nav-container {
            display: none !important;
        }

        /* Основной контейнер */
        .quiz-broadcast .about {
            height: 100vh;
            width: 100vw;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .quiz-broadcast .about__content {
            height: 100%;
            width: 100%;
        }

        .quiz-broadcast .quiz-container {
            height: 100vh;
            width: 100vw;
            max-width: 100%;
            margin: 0;
            border-radius: 0;
            padding: clamp(8px, 2vh, 20px);
            background: rgba(10,10,20,.95);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        /* Структура экрана */
        .quiz-broadcast .question-slide,
        .quiz-broadcast .answer-slide,
        .quiz-broadcast .instructions-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .quiz-broadcast .question-header {
            flex-shrink: 0;
            margin-bottom: clamp(5px, 1.5vh, 15px);
        }

        .quiz-broadcast .question-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .quiz-broadcast .answers-grid {
            grid-template-columns: repeat(2, 1fr);
            max-height: 100%;
            overflow-y: auto;
        }

        .quiz-broadcast .blitz-container {
            max-height: 100%;
            overflow-y: auto;
        }

        .quiz-broadcast .quiz-navigation {
            flex-shrink: 0;
            margin-top: clamp(5px, 1.5vh, 15px);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .quiz-broadcast .answers-grid { grid-template-columns: 1fr; }
            .quiz-broadcast .nav-buttons { flex-direction: column; }
            .quiz-broadcast .nav-btn { width: 100%; max-width: none; }
        }

        @media (max-width: 480px) {
            .quiz-broadcast .question-text { font-size: clamp(16px, 3.5vh, 20px) !important; }
            .quiz-broadcast .answer-option { font-size: clamp(12px, 2.5vh, 14px) !important; }
        }

        @media (max-height: 600px) {
            .quiz-broadcast .question-image { max-height: 20vh; }
            .quiz-broadcast .quiz-instruction { display: none; }
        }
    </style>
</head>
<body class="quiz-broadcast">
    <div class="broadcast-overlay">🎬 РЕЖИМ ТРАНСЛЯЦИИ</div>
    <div class="quiz-version-switcher">
        <button class="btn btn--outline" onclick="window.location.href='quiz.html'">📱 Обычный режим</button>
    </div>

    <section id="quiz-start" class="about">
        <div class="about__content">
            <div class="quiz-container">
                <div class="quiz-welcome" id="quiz-welcome">
                    <div class="welcome-content">
                        <h2>КВИЗ ODISSEA</h2>
                        <p>Готовы начать трансляцию?</p>
                        <div class="quiz-stats-grid">
                            <div class="quiz-stat-item"><div class="quiz-stat-number">7</div><div class="quiz-stat-label">Туров</div></div>
                            <div class="quiz-stat-item"><div class="quiz-stat-number">~60</div><div class="quiz-stat-label">Вопросов</div></div>
                            <div class="quiz-stat-item"><div class="quiz-stat-number">60</div><div class="quiz-stat-label">Секунд</div></div>
                        </div>
                        <button class="btn btn--primary start-quiz-btn" id="start-quiz-btn">НАЧАТЬ КВИЗ</button>
                    </div>
                </div>
                <div class="quiz-questions" id="quiz-questions" style="display: none;"></div>
                <div class="quiz-results" id="quiz-results" style="display: none;"></div>
            </div>
        </div>
    </section>

    <script src="../js/quiz.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fitContainer = () => {
                const container = document.querySelector('.quiz-container');
                if (container) {
                    container.style.height = window.innerHeight + 'px';
                    container.style.width = window.innerWidth + 'px';
                }
            };
            fitContainer();
            window.addEventListener('resize', fitContainer);
            
            new MutationObserver(fitContainer).observe(document.body, { childList: true, subtree: true });
        });

        // Переопределение методов для адаптации
        (function() {
            const originalShowQuestion = Quiz.prototype.showQuestion;
            const originalShowAnswerSlide = Quiz.prototype.showAnswerSlide;
            
            Quiz.prototype.showQuestion = function() {
                originalShowQuestion.call(this);
                setTimeout(() => {
                    document.querySelectorAll('.question-slide').forEach(slide => {
                        slide.classList.add('force-fit');
                        if (!slide.querySelector('.quiz-top-section')) {
                            const header = slide.querySelector('.question-header');
                            const content = slide.querySelector('.question-content');
                            const nav = slide.querySelector('.quiz-navigation');
                            if (header && content && nav) {
                                const topDiv = document.createElement('div');
                                topDiv.className = 'quiz-top-section';
                                header.parentNode.insertBefore(topDiv, header);
                                topDiv.appendChild(header);
                                
                                const midDiv = document.createElement('div');
                                midDiv.className = 'quiz-middle-section';
                                topDiv.parentNode.insertBefore(midDiv, topDiv.nextSibling);
                                midDiv.appendChild(content);
                                
                                const answersDiv = document.createElement('div');
                                answersDiv.className = 'quiz-answers-section';
                                const answersGrid = content.querySelector('.answers-grid, .blitz-container, .open-answer-instruction');
                                if (answersGrid) {
                                    answersDiv.appendChild(answersGrid);
                                    content.appendChild(answersDiv);
                                }
                                
                                const bottomDiv = document.createElement('div');
                                bottomDiv.className = 'quiz-bottom-section';
                                midDiv.parentNode.insertBefore(bottomDiv, midDiv.nextSibling);
                                bottomDiv.appendChild(nav);
                            }
                        }
                    });
                }, 50);
            };
            
            Quiz.prototype.showAnswerSlide = function() {
                originalShowAnswerSlide.call(this);
                setTimeout(() => document.querySelectorAll('.answer-slide').forEach(s => s.classList.add('force-fit')), 50);
            };
        })();
    </script>
</body>
</html>
